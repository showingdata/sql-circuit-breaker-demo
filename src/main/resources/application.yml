server:
  port: 8080
spring:
  application:
    name: circuit-breaker-demo
  datasource:
    dynamic:
      primary: slave_1 #默认主库名为master
      strict: false #不使用严格模式
      datasource:
        master:
          url: jdbc:mysql://127.0.0.1:3306/circuit_breaker_demo
          username: root
          password: 123456
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave_1:
          url: jdbc:mysql://127.0.0.1:3306/circuit_breaker_demo
          username: root
          password: 123456
          driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always           # 启动时执行 schema.sql
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# -------------------------------------------------------
# 熔断器配置（刻意缩短时间，方便演示）
# -------------------------------------------------------

sql-circuit-breaker:
  enabled: true
  select:
    # SELECT 超时阈值（毫秒），建议 10s
    timeout-ms: 1
    # 连续超时几次触发熔断，SELECT 建议 3
    failure-threshold: 1
    # 熔断持续时长（毫秒），建议 60s
    circuit-open-ms: 30000
    # 熔断状态缓存最大条目数（LRU 驱逐）
    cache-max-size: 5000
    # 缓存无访问驱逐时间（分钟），建议 30min
    cache-expire-after-access-minutes: 30
  insert:
    # DML 建议 5s
    timeout-ms: 5000
    # 连续超时几次触发熔断，INSERT 建议 1
    failure-threshold: 1
    # 熔断持续时长（毫秒），建议 30s
    circuit-open-ms: 30000
    # 熔断状态缓存最大条目数（LRU 驱逐）
    cache-max-size: 5000
    # 缓存无访问驱逐时间（分钟），建议 30min
    cache-expire-after-access-minutes: 30
  update:
    timeout-ms: 5000
    failure-threshold: 1
    circuit-open-ms: 30000
    cache-max-size: 5000
    cache-expire-after-access-minutes: 30
  delete:
    timeout-ms: 3000
    failure-threshold: 1
    circuit-open-ms: 30000
    cache-max-size: 5000
    cache-expire-after-access-minutes: 30
management:
  endpoints:
    web:
      exposure:
        include: prometheus, metrics
logging:
  level:
    io.github.showingdata.sql.circuit.breaker: INFO
    org.mybatis.spring: WARN



